version: '3'

vars:
  CSS_INPUT: "input.css"
  CSS_OUTPUT: "resources/styles/main.css"

tasks:
  templ:
    desc: "Gera os componentes Go a partir dos arquivos .templ"
    cmds:
      - templ generate

  css:
    desc: "Compila o CSS do Tailwind v4 em modo único de produção"
    cmds:
      - tailwindcss -i {{.CSS_INPUT}} -o {{.CSS_OUTPUT}}

  build:
    desc: "Compila os assets e gera o binário executável em Go com flags detalhadas"
    cmds:
      - go build -v .

  run:
    desc: "Executa o ambiente de desenvolvimento local (uma única vez)"
    deps: [build, templ, css]
    cmds:
      - go run .

  db:
    desc: "Recria o banco de dados"
    cmds:
      - rm selfin.db
      - sqlite3 selfin.db < models/schema.sql
      - sqlite3 selfin.db < models/data.sql

  dev:css:
    desc: "Observa e compila o CSS continuamente"
    cmds:
      - tailwindcss -i {{.CSS_INPUT}} -o {{.CSS_OUTPUT}} --watch

  dev:templ:
    desc: "Observa os arquivos .templ e reinicia o servidor Go automaticamente"
    cmds:
      - templ generate --watch --cmd="go run ." --proxy="http://localhost:9665"

  dev:
    desc: "Inicia o ambiente de desenvolvimento com Live Reload (Tailwind + Templ + Go Server)"
    deps: [dev:css, dev:templ]
